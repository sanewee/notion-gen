<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 Segment Clock</title>

<style>

html,body{
margin:0;
width:100%;
background:transparent;
}

#clock{
display:flex;
align-items:center;
width:100vw;
padding:0 5px;
gap:20px;
box-sizing:border-box;
}

/* 그룹 */

.group{
display:flex;
flex:1;
gap:6px;
}

/* 숫자 */

.digit{
position:relative;
flex:1;
aspect-ratio:2/3;
}

/* 세그먼트 */

.seg{
position:absolute;
background:#000;
opacity:0.08;
border-radius:999px;
transition:opacity .15s;
}

.seg.on{
opacity:1;
}

/* ===== 두께 설정 ===== */

:root{

--seg-h:14%;   /* 가로 세그먼트 두께 */
--seg-v:21%;   /* 세로 세그먼트 두께 (1.5배) */

--h-len:58%;
--v-len:36%;

--top-offset:7%;
--colon-size:3vw;

}

/* ===== 가로 세그먼트 ===== */

.seg.a{
top:0;
left:50%;
width:var(--h-len);
height:var(--seg-h);
transform:translateX(-50%);
}

.seg.g{
top:50%;
left:50%;
width:var(--h-len);
height:var(--seg-h);
transform:translate(-50%,-50%);
}

.seg.d{
bottom:0;
left:50%;
width:var(--h-len);
height:var(--seg-h);
transform:translateX(-50%);
}

/* ===== 세로 세그먼트 ===== */

.seg.f{
top:var(--top-offset);
left:0;
width:var(--seg-v);
height:var(--v-len);
}

.seg.b{
top:var(--top-offset);
right:0;
width:var(--seg-v);
height:var(--v-len);
}

.seg.e{
bottom:var(--top-offset);
left:0;
width:var(--seg-v);
height:var(--v-len);
}

.seg.c{
bottom:var(--top-offset);
right:0;
width:var(--seg-v);
height:var(--v-len);
}

/* ===== 초 색상 ===== */

.seconds .seg{
background:#b0b0b0;
}

/* ===== 콜론 ===== */

.colon{
position:relative;
flex:0 0 4%;
width:4%;
align-self:stretch;
}

.colon::before,
.colon::after{
content:"";
position:absolute;
left:50%;
transform:translateX(-50%);
width:var(--colon-size);
height:var(--colon-size);
background:#000;
border-radius:50%;
}

.colon::before{
top:28%;
}

.colon::after{
bottom:28%;
}

</style>
</head>

<body>

<div id="clock">

<div class="group" id="hour"></div>

<div class="colon"></div>

<div class="group" id="minute"></div>

<div class="colon"></div>

<div class="group seconds" id="second"></div>

</div>

<script>

const digitMap={
"0":["a","b","c","d","e","f"],
"1":["b","c"],
"2":["a","b","g","e","d"],
"3":["a","b","c","d","g"],
"4":["f","g","b","c"],
"5":["a","f","g","c","d"],
"6":["a","f","g","e","c","d"],
"7":["a","b","c"],
"8":["a","b","c","d","e","f","g"],
"9":["a","b","c","d","f","g"]
};

function createDigit(){

const digit=document.createElement("div");
digit.className="digit";

["a","b","c","d","e","f","g"].forEach(n=>{

const seg=document.createElement("div");
seg.className=`seg ${n}`;
digit.appendChild(seg);

});

return digit;
}

function createTwoDigits(id){

const group=document.getElementById(id);

const d1=createDigit();
const d2=createDigit();

group.appendChild(d1);
group.appendChild(d2);

return[d1,d2];

}

const hourDigits=createTwoDigits("hour");
const minuteDigits=createTwoDigits("minute");
const secondDigits=createTwoDigits("second");

function renderDigit(el,num){

const active=digitMap[num]||[];

el.querySelectorAll(".seg").forEach(seg=>{

const name=[...seg.classList].find(c=>"abcdefg".includes(c));
seg.classList.toggle("on",active.includes(name));

});

}

function renderTwoDigits(digits,value){

const s=String(value).padStart(2,"0");

renderDigit(digits[0],s[0]);
renderDigit(digits[1],s[1]);

}

function updateClock(){

const now=new Date();

renderTwoDigits(hourDigits,now.getHours());
renderTwoDigits(minuteDigits,now.getMinutes());
renderTwoDigits(secondDigits,now.getSeconds());

}

updateClock();

setInterval(updateClock,1000);

</script>

</body>
</html>
