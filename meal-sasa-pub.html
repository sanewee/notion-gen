<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      color: #111;
      font-family:
        ui-sans-serif,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Helvetica,
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        "Malgun Gothic",
        sans-serif;
      font-size: clamp(12px, 1.15vw, 18px);
    }

    .table-wrap {
      width: 100%;
      border: 3px solid #bdbdbd;
      overflow: hidden;
      box-sizing: border-box;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border: 3px solid #d0d0d0;
      text-align: center;
      vertical-align: top;
      word-break: keep-all;
      overflow-wrap: break-word;
      padding: 10px 12px;
      box-sizing: border-box;
    }

    thead th {
      background: #d3d3d3;
      color: #111;
      font-weight: 700;
      font-size: clamp(18px, 1.8vw, 32px);
      line-height: 1.2;
      padding-top: 8px;
      padding-bottom: 8px;
    }

    tbody td {
      background: #efefef;
      font-weight: 700;
      font-size: clamp(14px, 1.45vw, 26px);
      line-height: 1.45;
      white-space: normal;
      padding-top: 12px;
      padding-bottom: 12px;
    }

    .meal-item {
      display: block;
    }

    .date-row th {
      background: #f7f7f7;
      font-size: clamp(12px, 1vw, 16px);
      font-weight: 600;
      padding: 6px 8px;
      border-bottom: 3px solid #d0d0d0;
    }

    @media (prefers-color-scheme: dark) {
      html, body {
        background: #191919;
        color: #eee;
      }

      .table-wrap {
        border-color: #8d8d8d;
      }

      th, td {
        border-color: #8d8d8d;
      }

      thead th {
        background: #4a4a4a;
        color: #fff;
      }

      tbody td {
        background: #2a2a2a;
        color: #f1f1f1;
      }

      .date-row th {
        background: #222;
        color: #ddd;
      }
    }
  </style>
</head>
<body>
  <div class="table-wrap">
    <table id="mealTable">
      <thead>
        <tr class="date-row">
          <th id="dateCell" colspan="3"></th>
        </tr>
        <tr>
          <th>조식</th>
          <th>중식</th>
          <th>석식</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td id="breakfastCell"></td>
          <td id="lunchCell"></td>
          <td id="dinnerCell"></td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    function formatMeal(text) {
      if (!text || text === "-") return "-";
      return text
        .split("<br>")
        .map(item => `<span class="meal-item">${item.trim()}</span>`)
        .join("");
    }

    fetch("./meal-sasa.json")
      .then(res => {
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        return res.json();
      })
      .then(data => {
        document.getElementById("dateCell").textContent = data.date || "";
        document.getElementById("breakfastCell").innerHTML = formatMeal(data.breakfast);
        document.getElementById("lunchCell").innerHTML = formatMeal(data.lunch);
        document.getElementById("dinnerCell").innerHTML = formatMeal(data.dinner);
      })
      .catch(err => {
        console.error("JSON 불러오기 실패:", err);
        document.getElementById("mealTable").innerHTML =
          `<tr><td>데이터를 불러올 수 없습니다</td></tr>`;
      });
  </script>
</body>
</html>
