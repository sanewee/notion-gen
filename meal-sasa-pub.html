<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #111111;
      font-family:
        ui-sans-serif,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Helvetica,
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        "Malgun Gothic",
        sans-serif;
    }

    body {
      background: #ffffff;
    }

        /* 좌상단 */
    .meal-head th:first-child {
      border-top-left-radius: 50px;
    }
    
    /* 우상단 */
    .meal-head th:last-child {
      border-top-right-radius: 50px;
    }
    
    /* 좌하단 */
    .meal-body td:first-child {
      border-bottom-left-radius: 50px;
    }
    
    /* 우하단 */
    .meal-body td:last-child {
      border-bottom-right-radius: 50px;
    }

    .table-wrap {
      width: 100%;
      box-sizing: border-box;
      border: 5px solid #ffffff;
      background: #dcdcdc;
      overflow-x: auto;
      font-size: clamp(12px, 1.6vw, 26px);

      border-radius: 50px;   /* 추가 */
      overflow: hidden;      /* 추가 */
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: #dcdcdc;
    }

    th, td {
      border: 10px solid #ffffff;
      text-align: center;
      vertical-align: top;
      padding: 0.6em 0.8em;
      box-sizing: border-box;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .meal-head th {
      background: #e7e7e7;
      color: #111111;
      font-weight: 700;
      font-size: 2.0em;
      line-height: 1.2;
      padding: 0.45em 0.6em;
    }

    .meal-body td {
      background: #f9f8f7;
      color: #111111;
      font-weight: 700;
      font-size: 1.7em;
      line-height: 1.45;
      padding: 0.7em 0.9em;
    }

    .meal-item {
      display: block;
      margin: 0.12em 0;
    }
  </style>
</head>
<body>
  <div class="table-wrap">
    <table id="mealTable">
      <thead>
        <tr class="meal-head">
          <th>조식</th>
          <th>중식</th>
          <th>석식</th>
        </tr>
      </thead>
      <tbody>
        <tr class="meal-body">
          <td id="breakfastCell"></td>
          <td id="lunchCell"></td>
          <td id="dinnerCell"></td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    function formatMeal(text) {
      if (!text || text === "-") return "-";
      return text
        .split("<br>")
        .map(item => `<span class="meal-item">${item.trim()}</span>`)
        .join("");
    }

    fetch("./meal-sasa.json")
      .then(res => {
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        return res.json();
      })
      .then(data => {
        document.getElementById("breakfastCell").innerHTML = formatMeal(data.breakfast);
        document.getElementById("lunchCell").innerHTML = formatMeal(data.lunch);
        document.getElementById("dinnerCell").innerHTML = formatMeal(data.dinner);
      })
      .catch(err => {
        console.error("JSON 불러오기 실패:", err);
        document.getElementById("mealTable").innerHTML =
          `<tr><td colspan="3">데이터를 불러올 수 없습니다</td></tr>`;
      });
  </script>
</body>
</html>
