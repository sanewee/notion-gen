<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #111111;
      font-family:
        ui-sans-serif,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Helvetica,
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        "Malgun Gothic",
        sans-serif;
    }

    body {
      background: #ffffff;
    }

    .table-wrap {
      width: 100%;
      box-sizing: border-box;
      border: 5px solid #ffffff;
      overflow-x: auto;
      font-size: clamp(12px, 1.6vw, 26px);
      border-radius: 50px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border: 10px solid #ffffff;
      text-align: center;
      vertical-align: top;
      padding: 0.6em 0.8em;
      box-sizing: border-box;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .meal-head th {
      background: #e7e7e7;
      color: #111111;
      font-weight: 500;
      font-size: 2.0em;
      line-height: 1.2;
      padding: 0.45em 0.6em;
    }

    .meal-body td {
      background: #f9f8f7;
      color: #111111;
      font-weight: 500;
      font-size: 1.7em;
      line-height: 1.45;
      padding: 0.7em 0.9em;
    }

    .meal-item {
      display: block;
      margin: 0.12em 0;
    }

    .footer-ui {
      position: fixed;
      right: 12px;
      bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #555555;
      z-index: 10;
    }

    #refreshButton {
      border: 0;
      background: transparent;
      color: #555555;
      font-size: 14px;
      line-height: 1;
      padding: 2px 4px;
      cursor: pointer;
    }

    #refreshButton:hover {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="table-wrap">
    <table id="mealTable">
      <thead>
        <tr class="meal-head">
          <th>조식</th>
          <th>중식</th>
          <th>석식</th>
        </tr>
      </thead>
      <tbody>
        <tr class="meal-body">
          <td id="breakfastCell"></td>
          <td id="lunchCell"></td>
          <td id="dinnerCell"></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="footer-ui">
    <span id="dateText"></span>
    <button id="refreshButton" type="button" aria-label="새로고침">🔄</button>
  </div>

  <script>
    function formatMeal(text) {
      if (!text || text === "-") return "-";
      return text
        .split("<br>")
        .map(item => `<span class="meal-item">${item.trim()}</span>`)
        .join("");
    }

    function formatDate(dateText) {
      if (!dateText) return "";

      const match = dateText.match(/(\d+)년\s*(\d+)월\s*(\d+)일/);
      if (!match) return dateText;

      const year = match[1];
      const month = match[2].padStart(2, "0");
      const day = match[3].padStart(2, "0");

      return `${year}/${month}/${day}`;
    }

    document.getElementById("refreshButton").addEventListener("click", () => {
      location.reload();
    });

    fetch("./meal-sasa.json")
      .then(res => {
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        return res.json();
      })
      .then(data => {
        document.getElementById("breakfastCell").innerHTML = formatMeal(data.breakfast);
        document.getElementById("lunchCell").innerHTML = formatMeal(data.lunch);
        document.getElementById("dinnerCell").innerHTML = formatMeal(data.dinner);
        document.getElementById("dateText").textContent = formatDate(data.date);
      })
      .catch(err => {
        console.error("JSON 불러오기 실패:", err);
        document.getElementById("mealTable").innerHTML =
          `<tr><td colspan="3">데이터를 불러올 수 없습니다</td></tr>`;
      });
  </script>
</body>
</html>
