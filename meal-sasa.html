<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Meal</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      font-size: clamp(12px, 1.2vw, 18px);
      background-color: #fff;
      color: #000;
    }

    .table-wrap {
      border: 1px solid #EBEBE9;
      border-radius: 8px;
      overflow: hidden;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      table-layout: fixed;
    }

    th, td {
      border: 1px solid #EBEBE9;
      padding: 6px 8px;
      text-align: center;
      vertical-align: top;
      word-break: break-word;
      background-color: #fff;
      color: #000;
    }

    th {
      font-weight: 600;
      background-color: #F8F8F7;
    }

    @media (prefers-color-scheme: dark) {
      html, body {
        background-color: #191919;
        color: #E9E9E7;
      }

      .table-wrap {
        border-color: #e9e9e7;
      }

      th, td {
        background-color: #191919 !important;
        color: #eee !important;
        border-color: #e9e9e7 !important;
      }

      th {
        background-color: #2f2f2f !important;
        color: #fff !important;
      }
    }
  </style>
</head>
<body>
  <div class="table-wrap">
    <table id="mealTable">
      <thead>
        <tr id="dateRow"></tr>
      </thead>
      <tbody>
        <tr id="breakfastRow"></tr>
        <tr id="lunchRow"></tr>
        <tr id="dinnerRow"></tr>
      </tbody>
    </table>
  </div>

  <script>
    fetch("./meal-sasa.json")
      .then(res => {
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        return res.json();
      })
      .then(data => {
        document.getElementById("dateRow").innerHTML = `<th>${data.date}</th>`;
        document.getElementById("breakfastRow").innerHTML = `<td>${data.breakfast || "-"}</td>`;
        document.getElementById("lunchRow").innerHTML = `<td>${data.lunch || "-"}</td>`;
        document.getElementById("dinnerRow").innerHTML = `<td>${data.dinner || "-"}</td>`;
      })
      .catch(err => {
        console.error("JSON 불러오기 실패:", err);
        document.getElementById("mealTable").innerHTML =
          `<tr><td>데이터를 불러올 수 없습니다</td></tr>`;
      });
  </script>
</body>
</html>
